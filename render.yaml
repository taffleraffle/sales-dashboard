services:
  - type: web
    name: opt-sales-dashboard
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # index.html must ALWAYS revalidate — it references hashed asset
      # filenames, so a stale cached HTML loads old JS/CSS even after deploy.
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Hashed assets are immutable — long-cache them.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_META_ADS_ACCOUNT_ID
        sync: false
      - key: VITE_META_ADS_ACCESS_TOKEN
        sync: false
      - key: VITE_HYROS_API_KEY
        sync: false
      - key: VITE_FATHOM_API_KEY
        sync: false
      - key: VITE_GHL_API_KEY
        sync: false
      - key: VITE_GHL_LOCATION_ID
        sync: false
      - key: VITE_NZD_TO_USD
        sync: false
